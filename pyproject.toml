[project]
name = "kms"
version = "0.1.0"
description = "knowledge management and metacognitive learning system"
requires-python = ">=3.12, <=3.14"
dependencies = [
  "pydantic>=2.0",
  "dspy-ai>=3.2.1",
  "langgraph>=0.2",
  "docling[vlm]>=2.113.0",
  "fsrs>=6.3.1",
  "torch",
  "torchvision",
  "torchaudio",
  "neo4j>=6.2.0",
]

[tool.pyright]
venvPath = "."
venv = ".venv"

[tool.uv]
package = false  # Disables the local build requirement entirely!

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu128" }
torchvision = { index = "pytorch-cu128" }
torchaudio = { index = "pytorch-cu128" }

